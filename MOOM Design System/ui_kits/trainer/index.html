<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOOM Trainer — UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=LINE+Seed+Sans+TH:wght@400;500;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;700&display=swap">
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'LINE Seed Sans TH','IBM Plex Sans Thai',system-ui,sans-serif;
    font-size:13px;
    background:
      radial-gradient(1200px 600px at 20% -10%, hsl(25 95% 53% / 0.18), transparent 60%),
      radial-gradient(900px 500px at 90% 110%, hsl(168 75% 42% / 0.15), transparent 60%),
      linear-gradient(180deg, hsl(222 40% 10%), hsl(222 32% 16%));
    color:hsl(220 20% 8%);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .stage{display:flex; flex-direction:column; align-items:center; gap:14px}
  .phone{
    width:390px; height:810px;
    background:hsl(30 10% 98%);
    border-radius:40px;
    overflow:hidden; position:relative;
    box-shadow:0 24px 60px rgba(0,0,0,.35), 0 0 0 8px hsl(220 20% 8%), 0 0 0 9px hsl(220 15% 20%);
    display:flex; flex-direction:column;
  }
  .phone-body{flex:1; overflow-y:auto; overflow-x:hidden}
  .phone-body::-webkit-scrollbar{width:0}
  .caption{font-size:12px; color:hsl(30 8% 78%); font-weight:500}
  @keyframes flame-flicker{0%,100%{opacity:1}50%{opacity:.6}}
  @keyframes pulse-dot{0%,100%{transform:scale(1);box-shadow:0 0 0 0 hsl(25 95% 53% / 0.6)}50%{transform:scale(1.2);box-shadow:0 0 0 5px hsl(25 95% 53% / 0)}}
  button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Tokens.jsx"></script>
<script type="text/babel" src="../member/Components.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;
  function App() {
    const [screen, setScreen] = useState(() => localStorage.getItem('moom-trainer-screen') || 'today');
    useEffect(() => { localStorage.setItem('moom-trainer-screen', screen); }, [screen]);
    const showTopBar = screen !== 'roster';
    return (
      <div className="stage">
        <div className="phone">
          {showTopBar && <TrainerTopBar/>}
          <div className="phone-body">
            {screen === 'today'   && <TrainerToday onOpenClass={() => setScreen('roster')}/>}
            {screen === 'roster'  && <TrainerRoster/>}
            {screen === 'scan'    && <QRScanner/>}
            {screen === 'members' && <TrainerMembers/>}
            {screen === 'me'      && <TrainerMe/>}
          </div>
          <TrainerNav screen={screen} onChange={setScreen}/>
        </div>
        <div className="caption">MOOM Trainer · Coach tools</div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
