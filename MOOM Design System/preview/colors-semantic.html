<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Semantic · success / warning / destructive / info</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
  <div class="stack" style="gap:4px"><div style="height:56px;background:hsl(168 75% 43%);border-radius:6px"></div><b style="font-size:11px">Teal / Success</b><span class="mono">168 75% 43%</span><span style="font-size:10px;color:hsl(0 0% 45%)">paid, healthy, active</span></div>
  <div class="stack" style="gap:4px"><div style="height:56px;background:hsl(38 92% 50%);border-radius:6px"></div><b style="font-size:11px">Warning</b><span class="mono">38 92% 50%</span><span style="font-size:10px;color:hsl(0 0% 45%)">medium risk, expiring</span></div>
  <div class="stack" style="gap:4px"><div style="height:56px;background:hsl(0 72% 71%);border-radius:6px"></div><b style="font-size:11px">Destructive</b><span class="mono">0 72% 71%</span><span style="font-size:10px;color:hsl(0 0% 45%)">high risk, errors</span></div>
  <div class="stack" style="gap:4px"><div style="height:56px;background:hsl(210 70% 55%);border-radius:6px"></div><b style="font-size:11px">Info</b><span class="mono">210 70% 55%</span><span style="font-size:10px;color:hsl(0 0% 45%)">classes count, neutral KPI</span></div>
</div>
<div class="row" style="margin-top:10px;gap:6px;flex-wrap:wrap">
  <span style="background:hsl(168 70% 95%);color:hsl(168 75% 30%);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600">success light</span>
  <span style="background:hsl(38 92% 92%);color:hsl(38 92% 20%);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600">warning light</span>
  <span style="background:hsl(0 100% 95%);color:hsl(0 72% 40%);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600">destructive light</span>
</div>
</div></body></html>
