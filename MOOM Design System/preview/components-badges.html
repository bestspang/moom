<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Badges · Status Pills</div>
<div class="row" style="gap:6px;flex-wrap:wrap">
  <span style="background:hsl(32 100% 50%);color:#fff;padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">Pending</span>
  <span style="background:hsl(168 75% 43%);color:#fff;padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">Active</span>
  <span style="background:hsl(168 75% 43%);color:#fff;padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">Paid</span>
  <span style="background:hsl(0 72% 71%);color:#fff;padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">High risk</span>
  <span style="background:hsl(38 92% 92%);color:hsl(38 92% 20%);padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">Medium risk</span>
  <span style="background:hsl(168 70% 95%);color:hsl(168 75% 30%);padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">Low risk</span>
  <span style="background:hsl(210 20% 96%);color:hsl(0 0% 40%);padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">Draft</span>
  <span style="border:1px solid hsl(0 0% 88%);color:hsl(0 0% 20%);padding:1px 10px;border-radius:9999px;font-size:11px;font-weight:600">Outline</span>
</div>
<div style="margin-top:12px;font-size:11px;color:hsl(0 0% 45%)">Pills · radius 20px / full · 11px / 600 / px-2.5 py-px · never below 10px text</div>
</div></body></html>
