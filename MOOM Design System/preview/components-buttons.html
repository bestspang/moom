<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Buttons</div>
<div class="row" style="gap:10px;flex-wrap:wrap">
  <button style="background:hsl(32 100% 50%);color:#fff;border:0;height:36px;padding:0 12px;border-radius:6px;font-weight:500;font-size:13px;cursor:pointer">Primary action</button>
  <button style="background:hsl(210 20% 96%);color:hsl(0 0% 20%);border:0;height:36px;padding:0 12px;border-radius:6px;font-weight:500;font-size:13px">Secondary</button>
  <button style="background:#fff;color:hsl(0 0% 20%);border:1px solid hsl(0 0% 88%);height:36px;padding:0 12px;border-radius:6px;font-weight:500;font-size:13px">Outline</button>
  <button style="background:transparent;color:hsl(0 0% 20%);border:0;height:36px;padding:0 12px;border-radius:6px;font-weight:500;font-size:13px">Ghost</button>
  <button style="background:hsl(0 72% 71%);color:#fff;border:0;height:36px;padding:0 12px;border-radius:6px;font-weight:500;font-size:13px">Destructive</button>
</div>
<div class="row" style="gap:10px;margin-top:10px">
  <button style="background:hsl(32 100% 50%);color:#fff;border:0;height:32px;padding:0 10px;border-radius:6px;font-size:12px;font-weight:500">sm · 32h</button>
  <button style="background:hsl(32 100% 50%);color:#fff;border:0;height:36px;padding:0 12px;border-radius:6px;font-size:13px;font-weight:500">default · 36h</button>
  <button style="background:hsl(32 100% 50%);color:#fff;border:0;height:44px;padding:0 32px;border-radius:6px;font-size:14px;font-weight:500">lg · 44h</button>
  <button style="background:hsl(32 100% 50%);color:#fff;border:0;width:32px;height:32px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center">+</button>
</div>
<div style="margin-top:10px;font-size:11px;color:hsl(0 0% 45%)">Hover = opacity /0.9 · Focus = 2px orange ring w/ 2px offset · no scale, no shadow-bump</div>
</div></body></html>
