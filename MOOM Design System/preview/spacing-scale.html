<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Spacing scale · 4 · 8 · 12 · 16 · 24 · 32 · 48</div>
<div class="stack" style="gap:6px">
  <div class="row"><div style="width:4px;height:16px;background:hsl(32 100% 50%)"></div><span class="mono">4</span><span style="font-size:11px;color:hsl(0 0% 45%)">icon gap inside tight rows</span></div>
  <div class="row"><div style="width:8px;height:16px;background:hsl(32 100% 50%)"></div><span class="mono">8</span><span style="font-size:11px;color:hsl(0 0% 45%)">button inner gap, chip padding</span></div>
  <div class="row"><div style="width:12px;height:16px;background:hsl(32 100% 50%)"></div><span class="mono">12</span><span style="font-size:11px;color:hsl(0 0% 45%)">card padding (p-3) — MOOM default</span></div>
  <div class="row"><div style="width:16px;height:16px;background:hsl(32 100% 50%)"></div><span class="mono">16</span><span style="font-size:11px;color:hsl(0 0% 45%)">mobile section gap (mb-4)</span></div>

  <div class="row"><div style="width:32px;height:16px;background:hsl(32 100% 50%)"></div><span class="mono">32</span><span style="font-size:11px;color:hsl(0 0% 45%)">container horizontal padding</span></div>
  <div class="row"><div style="width:48px;height:16px;background:hsl(32 100% 50%)"></div><span class="mono">48</span><span style="font-size:11px;color:hsl(0 0% 45%)">large vertical rhythm</span></div>
</div>
</div></body></html>
