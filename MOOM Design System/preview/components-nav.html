<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Nav · sidebar item + bottom tab</div>
<div class="row" style="gap:14px;align-items:flex-start">
  <div style="width:190px;background:hsl(36 33% 94%);border:1px solid hsl(36 20% 88%);border-radius:8px;padding:8px">
    <div style="display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;background:hsl(32 100% 50%);color:#fff;font-size:12px;font-weight:600">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Dashboard
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:6px 10px;font-size:12px;color:hsl(0 0% 20%);font-weight:500"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>Lobby</div>
    <div style="display:flex;align-items:center;gap:10px;padding:6px 10px;font-size:12px;color:hsl(0 0% 20%);font-weight:500"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/></svg>Schedule</div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;font-size:12px;color:hsl(0 0% 20%);font-weight:500">
      <div style="display:flex;align-items:center;gap:10px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/></svg>Members</div>
      <span style="background:hsl(38 92% 50%);color:#fff;font-size:10px;padding:1px 6px;border-radius:9999px;font-weight:600">3</span>
    </div>
  </div>
  <div style="flex:1">
    <div style="border:1px solid hsl(0 0% 88%);border-top:1px solid hsl(0 0% 88%);border-radius:8px;padding:8px 12px;background:#fff">
      <div style="display:flex;justify-content:space-around;align-items:flex-end;position:relative;height:56px">
        <div style="display:flex;flex-direction:column;align-items:center;color:hsl(32 100% 50%);font-size:10px;font-weight:600">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Home
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;color:hsl(0 0% 45%);font-size:10px">Schedule</div>
        <div style="display:flex;flex-direction:column;align-items:center;margin-top:-16px;">
          <div style="width:44px;height:44px;border-radius:50%;background:hsl(32 100% 50%);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.15)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </div>
          <span style="font-size:10px;margin-top:2px;color:hsl(0 0% 45%)">Check-in</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;color:hsl(0 0% 45%);font-size:10px">Rewards</div>
        <div style="display:flex;flex-direction:column;align-items:center;color:hsl(0 0% 45%);font-size:10px">Profile</div>
      </div>
    </div>
    <div style="font-size:11px;color:hsl(0 0% 45%);margin-top:6px">Mobile: center FAB sits -mt-4 above baseline</div>
  </div>
</div>
</div></body></html>
