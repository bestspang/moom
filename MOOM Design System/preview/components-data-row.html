<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Data row · dashboard schedule item</div>
<div style="border:1px solid hsl(0 0% 88%);border-radius:8px;background:#fff">
  <div style="padding:10px 12px;border-bottom:1px solid hsl(0 0% 88%);display:flex;align-items:center;gap:12px">
    <span style="font-family:ui-monospace,monospace;font-size:11px;color:hsl(0 0% 45%);width:48px">07:00</span>
    <span style="font-size:13px;font-weight:500;flex:1">Spin · High Intensity</span>
    <span style="font-size:11px;color:hsl(0 0% 45%)">Coach Arm</span>
    <div style="display:flex;align-items:center;gap:6px">
      <div style="width:40px;height:4px;background:hsl(210 20% 92%);border-radius:9999px;overflow:hidden"><div style="width:85%;height:100%;background:hsl(168 75% 43%)"></div></div>
      <span style="font-size:11px;color:hsl(168 75% 30%);font-weight:600">17/20</span>
    </div>
  </div>
  <div style="padding:10px 12px;border-bottom:1px solid hsl(0 0% 88%);display:flex;align-items:center;gap:12px;background:hsl(210 20% 98%)">
    <span style="font-family:ui-monospace,monospace;font-size:11px;color:hsl(0 0% 45%);width:48px">08:00</span>
    <span style="font-size:13px;font-weight:500;flex:1">Yoga · Vinyasa Flow</span>
    <span style="font-size:11px;color:hsl(0 0% 45%)">Coach Nok</span>
    <div style="display:flex;align-items:center;gap:6px">
      <div style="width:40px;height:4px;background:hsl(210 20% 92%);border-radius:9999px;overflow:hidden"><div style="width:45%;height:100%;background:hsl(38 92% 50%)"></div></div>
      <span style="font-size:11px;color:hsl(38 92% 35%);font-weight:600">9/20</span>
    </div>
  </div>
  <div style="padding:10px 12px;display:flex;align-items:center;gap:12px">
    <span style="font-family:ui-monospace,monospace;font-size:11px;color:hsl(0 0% 45%);width:48px">09:30</span>
    <span style="font-size:13px;font-weight:500;flex:1">Strength · Full Body</span>
    <span style="font-size:11px;color:hsl(0 0% 45%)">Coach Best</span>
    <div style="display:flex;align-items:center;gap:6px">
      <div style="width:40px;height:4px;background:hsl(210 20% 92%);border-radius:9999px;overflow:hidden"><div style="width:20%;height:100%;background:hsl(0 72% 71%)"></div></div>
      <span style="font-size:11px;color:hsl(0 72% 45%);font-weight:600">4/20</span>
    </div>
  </div>
</div>
</div></body></html>
