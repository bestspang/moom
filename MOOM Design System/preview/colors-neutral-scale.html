<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Neutral Scale · 5 step grey</div>
<div class="row" style="gap:0">
  <div style="flex:1;height:72px;background:hsl(0 0% 100%);border:1px solid hsl(0 0% 88%);padding:6px;font-size:10px">100% · bg</div>
  <div style="flex:1;height:72px;background:hsl(210 20% 96%);padding:6px;font-size:10px">96% · muted</div>
  <div style="flex:1;height:72px;background:hsl(0 0% 88%);padding:6px;font-size:10px">88% · border</div>
  <div style="flex:1;height:72px;background:hsl(0 0% 60%);padding:6px;font-size:10px;color:#fff">60% · text-light</div>
  <div style="flex:1;height:72px;background:hsl(0 0% 40%);padding:6px;font-size:10px;color:#fff">40% · text-medium</div>
  <div style="flex:1;height:72px;background:hsl(0 0% 20%);padding:6px;font-size:10px;color:#fff">20% · fg</div>
</div>
</div></body></html>
