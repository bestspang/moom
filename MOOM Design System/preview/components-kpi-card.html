<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Cards · the KPI tile with left-border accent</div>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
  <div style="border:1px solid hsl(0 0% 88%);border-left:4px solid hsl(168 75% 43%);background:#fff;border-radius:8px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <div style="font-size:13px;color:hsl(0 0% 45%)">Check-ins today</div>
    <div style="font-size:18px;font-weight:700;margin-top:4px">127</div>
    <div style="font-size:11px;color:hsl(168 75% 30%);margin-top:4px">↑ +12 vs Fri</div>
  </div>
  <div style="border:1px solid hsl(0 0% 88%);border-left:4px solid hsl(32 100% 50%);background:#fff;border-radius:8px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <div style="font-size:13px;color:hsl(0 0% 45%)">Currently in class</div>
    <div style="font-size:18px;font-weight:700;margin-top:4px">34</div>
    <div style="font-size:11px;color:hsl(0 0% 45%);margin-top:4px">attendees</div>
  </div>
</div>
<div style="margin-top:10px;font-size:11px;color:hsl(0 0% 45%)">1px border · 8px radius · shadow-md · p-3 (12px) · 4px colored left border to categorize</div>
</div></body></html>
