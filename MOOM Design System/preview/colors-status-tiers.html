<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Status Tiers · Bronze → Black</div>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
  <div class="stack" style="align-items:center;gap:4px"><div style="width:48px;height:48px;border-radius:50%;background:hsl(30 50% 45% / 0.15);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 8px hsl(30 50% 45% / 0.15)">🥉</div><b style="font-size:10px;color:hsl(30 50% 35%)">BRONZE</b></div>
  <div class="stack" style="align-items:center;gap:4px"><div style="width:48px;height:48px;border-radius:50%;background:hsl(210 10% 65% / 0.15);display:flex;align-items:center;justify-content:center;font-size:20px">🥈</div><b style="font-size:10px;color:hsl(210 10% 45%)">SILVER</b></div>
  <div class="stack" style="align-items:center;gap:4px"><div style="width:48px;height:48px;border-radius:50%;background:hsl(45 85% 50% / 0.15);display:flex;align-items:center;justify-content:center;font-size:20px">🥇</div><b style="font-size:10px;color:hsl(45 85% 35%)">GOLD</b></div>
  <div class="stack" style="align-items:center;gap:4px"><div style="width:48px;height:48px;border-radius:50%;background:hsl(200 15% 75% / 0.18);display:flex;align-items:center;justify-content:center;font-size:20px">💠</div><b style="font-size:10px;color:hsl(200 15% 50%)">PLATINUM</b></div>
  <div class="stack" style="align-items:center;gap:4px"><div style="width:48px;height:48px;border-radius:50%;background:hsl(195 80% 65% / 0.18);display:flex;align-items:center;justify-content:center;font-size:20px">💎</div><b style="font-size:10px;color:hsl(195 80% 40%)">DIAMOND</b></div>
  <div class="stack" style="align-items:center;gap:4px"><div style="width:48px;height:48px;border-radius:50%;background:hsl(0 0% 15% / 0.15);display:flex;align-items:center;justify-content:center;font-size:20px">🖤</div><b style="font-size:10px;color:hsl(0 0% 15%)">BLACK</b></div>
</div>
<div style="margin-top:10px;font-size:11px;color:hsl(0 0% 45%)">6-tier member loyalty system. Emoji medals are the only sanctioned emoji-as-icon in the brand.</div>
</div></body></html>
