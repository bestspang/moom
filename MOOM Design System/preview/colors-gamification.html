<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Gamification · Rarity + Momentum</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
  <div class="stack" style="gap:3px"><div style="height:44px;background:hsl(220 10% 60%);border-radius:6px"></div><b style="font-size:11px">Common</b></div>
  <div class="stack" style="gap:3px"><div style="height:44px;background:hsl(210 70% 55%);border-radius:6px"></div><b style="font-size:11px">Rare</b></div>
  <div class="stack" style="gap:3px"><div style="height:44px;background:hsl(280 65% 55%);border-radius:6px"></div><b style="font-size:11px">Epic</b></div>
  <div class="stack" style="gap:3px"><div style="height:44px;background:hsl(45 93% 47%);border-radius:6px"></div><b style="font-size:11px">Legendary</b></div>
</div>
<div style="margin-top:14px" class="eyebrow">Momentum / Flame</div>
<div class="row" style="gap:10px;margin-top:6px">
  <div style="width:40px;height:56px;background:linear-gradient(to top, hsl(32 100% 50%), hsl(38 92% 50%));border-radius:50% 50% 50% 50% / 60% 60% 40% 40%"></div>
  <div style="font-size:11px"><b>flame</b> hsl(32 100% 50%) → <b>glow</b> hsl(38 92% 50%)<br><span style="color:hsl(0 0% 45%)">streak icon uses flame-flicker 0.8s animation</span></div>
</div>
</div></body></html>
