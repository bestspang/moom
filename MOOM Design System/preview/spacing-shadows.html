<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Shadows · soft, shallow — cards lean on borders, not depth</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
  <div style="background:#fff;padding:14px;border-radius:8px;border:1px solid hsl(0 0% 88%);box-shadow:0 1px 2px rgba(0,0,0,.05)">
    <div style="font-size:12px;font-weight:600">shadow-sm</div>
    <div style="font-size:10px;color:hsl(0 0% 45%);margin-top:2px">0 1px 2px .05 · rest state</div>
  </div>
  <div style="background:#fff;padding:14px;border-radius:8px;border:1px solid hsl(0 0% 88%);box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <div style="font-size:12px;font-weight:600">shadow-md</div>
    <div style="font-size:10px;color:hsl(0 0% 45%);margin-top:2px">0 2px 8px .08 · card default</div>
  </div>
  <div style="background:#fff;padding:14px;border-radius:8px;border:1px solid hsl(0 0% 88%);box-shadow:0 4px 16px rgba(0,0,0,.10)">
    <div style="font-size:12px;font-weight:600">shadow-lg</div>
    <div style="font-size:10px;color:hsl(0 0% 45%);margin-top:2px">0 4px 16px .10 · modal / floating</div>
  </div>
</div>
</div></body></html>
