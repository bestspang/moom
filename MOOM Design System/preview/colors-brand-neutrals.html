<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="stack">
  <div class="eyebrow">Brand Neutrals</div>
  <div class="row">
    <div style="width:90px;height:64px;background:hsl(0 0% 15%);border-radius:8px"></div>
    <div class="stack" style="gap:0"><b>Black</b><span class="mono">hsl(0 0% 15%) · #262626</span><span style="color:hsl(0 0% 45%);font-size:11px">logo, body text, black-tier</span></div>
  </div>
  <div class="row">
    <div style="width:90px;height:64px;background:hsl(36 33% 94%);border-radius:8px;border:1px solid hsl(0 0% 88%)"></div>
    <div class="stack" style="gap:0"><b>Cream</b><span class="mono">hsl(36 33% 94%) · #F4EFE6</span><span style="color:hsl(0 0% 45%);font-size:11px">sidebar bg — warm, not grey</span></div>
  </div>
  <div class="row">
    <div style="width:90px;height:64px;background:hsl(36 33% 90%);border-radius:8px;border:1px solid hsl(0 0% 88%)"></div>
    <div class="stack" style="gap:0"><b>Cream-deep</b><span class="mono">hsl(36 33% 90%)</span><span style="color:hsl(0 0% 45%);font-size:11px">sidebar-accent on hover</span></div>
  </div>
</div>
</div></body></html>
