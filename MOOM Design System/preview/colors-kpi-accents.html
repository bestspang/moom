<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">KPI Accent Colors · left-border categorization</div>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
  <div class="stack" style="gap:4px"><div style="height:44px;background:hsl(32 100% 50%);border-radius:6px"></div><b style="font-size:11px">Orange</b><span style="font-size:10px;color:hsl(0 0% 45%)">check-ins, primary</span></div>
  <div class="stack" style="gap:4px"><div style="height:44px;background:hsl(210 70% 55%);border-radius:6px"></div><b style="font-size:11px">Blue</b><span style="font-size:10px;color:hsl(0 0% 45%)">classes count</span></div>
  <div class="stack" style="gap:4px"><div style="height:44px;background:hsl(168 75% 43%);border-radius:6px"></div><b style="font-size:11px">Teal</b><span style="font-size:10px;color:hsl(0 0% 45%)">in class, healthy</span></div>
  <div class="stack" style="gap:4px"><div style="height:44px;background:hsl(330 75% 58%);border-radius:6px"></div><b style="font-size:11px">Pink</b><span style="font-size:10px;color:hsl(0 0% 45%)">revenue</span></div>
  <div class="stack" style="gap:4px"><div style="height:44px;background:hsl(220 10% 55%);border-radius:6px"></div><b style="font-size:11px">Slate</b><span style="font-size:10px;color:hsl(0 0% 45%)">members / generic</span></div>
</div>
<div style="margin-top:10px;font-size:11px;color:hsl(0 0% 45%)">KPI tiles use 4px colored left border + a large muted-grey icon on the right to categorize at a glance.</div>
</div></body></html>
