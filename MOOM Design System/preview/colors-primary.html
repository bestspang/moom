<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="stack">
  <div class="eyebrow">Primary / Brand</div>
  <div class="row">
    <div style="width:120px;height:80px;background:hsl(32 100% 50%);border-radius:8px;display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:10px;font-weight:600">MOOM Orange</div>
    <div class="stack" style="gap:2px">
      <div style="font-weight:600">hsl(32 100% 50%)</div>
      <div class="mono">#FF8800</div>
      <div style="color:hsl(0 0% 45%);font-size:11px">--primary · primary CTA, XP bar, streak flame, focus ring</div>
    </div>
  </div>
  <div class="row" style="gap:8px">
    <div style="width:56px;height:40px;background:hsl(32 100% 45%);border-radius:6px"></div>
    <div style="font-size:11px"><b>Hover</b> · hsl(32 100% 45%) · #E67A00</div>
  </div>
  <div class="row" style="gap:8px">
    <div style="width:56px;height:40px;background:hsl(32 100% 50% / 0.08);border-radius:6px;border:1px solid hsl(0 0% 88%)"></div>
    <div style="font-size:11px"><b>Soft tint</b> · primary/.08 · used for active-nav haze + subtle surfaces</div>
  </div>
</div>
</div></body></html>
