<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body><div class="card">
<div class="eyebrow" style="margin-bottom:10px">Form · input / select / textarea</div>
<div class="stack" style="gap:8px">
  <div><label style="font-size:11px;font-weight:500;display:block;margin-bottom:4px">Member name</label>
  <input placeholder="e.g. Ploy Chanakarn" style="width:100%;height:36px;border:1px solid hsl(0 0% 88%);border-radius:6px;padding:0 10px;font-size:13px;font-family:inherit"/></div>
  <div><label style="font-size:11px;font-weight:500;display:block;margin-bottom:4px">Location</label>
  <select style="width:100%;height:36px;border:1px solid hsl(0 0% 88%);border-radius:6px;padding:0 10px;font-size:13px;background:#fff"><option>Asok Branch</option></select></div>
  <div class="row" style="gap:8px">
    <label style="display:flex;align-items:center;gap:6px;font-size:12px"><input type="checkbox" checked/> Active</label>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px"><input type="radio" name="r" checked/> Monthly</label>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px"><input type="radio" name="r"/> Annual</label>
  </div>
</div>
</div></body></html>
